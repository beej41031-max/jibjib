<svg viewBox="0 0 900 520" role="img" aria-label="จิบๆ Coffee Passport logo" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgInk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#120C08"/>
      <stop offset="0.66" stop-color="#21130D"/>
      <stop offset="1" stop-color="#083E36"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D7FF28"/>
      <stop offset="0.54" stop-color="#D7FF28"/>
      <stop offset="1" stop-color="#FF5C42"/>
    </linearGradient>
    <filter id="lift" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#170E08" flood-opacity="0.22"/>
    </filter>
    <style>
      .thai{font-family:'Noto Sans Thai','IBM Plex Sans Thai',Tahoma,sans-serif;font-weight:900;letter-spacing:-12px;}
      .repeat{font-family:'Noto Sans Thai','IBM Plex Sans Thai',Tahoma,sans-serif;font-weight:900;letter-spacing:-8px;}
      .en{font-family:'Inter','IBM Plex Mono',ui-monospace,monospace;font-weight:900;letter-spacing:8px;}
      .micro{font-family:'Inter','IBM Plex Sans Thai',Arial,sans-serif;font-weight:800;letter-spacing:2.5px;}
    </style>
  </defs>

  <rect width="900" height="520" fill="#F8F0E4"/>
  <circle cx="790" cy="80" r="170" fill="#D7FF28" opacity="0.14"/>
  <circle cx="120" cy="500" r="190" fill="#FF5C42" opacity="0.10"/>

  <g transform="translate(90 72)" filter="url(#lift)">
    <rect x="0" y="0" width="720" height="300" rx="56" fill="url(#bgInk)"/>
    <rect x="34" y="33" width="652" height="234" rx="44" fill="none" stroke="#FFF8EC" stroke-opacity="0.08" stroke-width="2"/>

    <!-- sleek top accents, more stamp/app than old cafe steam -->
    <path d="M64 58 H208" stroke="#D7FF28" stroke-width="7" stroke-linecap="round"/>
    <path d="M586 58 H650" stroke="#FF5C42" stroke-width="7" stroke-linecap="round"/>

    <!-- Thai-first logo: จิบ + repetition grammar mark as neon flex accent -->
    <text x="72" y="177" class="thai" font-size="152" fill="#FFF8EC">จิบ</text>
    <text x="285" y="166" class="repeat" font-size="126" fill="url(#hot)">ๆ</text>

    <!-- tiny check-in dot beside repeat mark -->
    <circle cx="397" cy="82" r="8" fill="#FF5C42"/>
    <circle cx="397" cy="82" r="15" fill="none" stroke="#FF5C42" stroke-opacity="0.24" stroke-width="3"/>

    <!-- subhead -->
    <rect x="76" y="220" width="40" height="6" rx="3" fill="#D7FF28"/>
    <text x="140" y="226" class="en" font-size="20" fill="#FFF8EC" opacity="0.80">COFFEE PASSPORT</text>
    <text x="480" y="226" class="micro" font-size="14" fill="#D7FF28">SIP STAMP FLEX</text>
  </g>

  <!-- compact mark shown below for app icon preview -->
  <g transform="translate(345 402)">
    <rect x="0" y="0" width="210" height="76" rx="28" fill="#FFF8EC" stroke="#211711" stroke-opacity="0.14"/>
    <text x="30" y="55" class="thai" font-size="56" fill="#211711">จิบ</text>
    <text x="113" y="51" class="repeat" font-size="46" fill="#FF5C42">ๆ</text>
    <text x="152" y="42" class="micro" font-size="11" fill="#211711" opacity="0.55">APP MARK</text>
  </g>
</svg>
